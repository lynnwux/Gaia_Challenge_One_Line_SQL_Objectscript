app = "gaia-sql-golden-tee"
primary_region = "iad"

[vm]
  size = "performance-2x"

[build]
  image = "lynnwu351/gaia-golden-tee:latest"

# Set BEDROCK_BEARER_TOKEN as a secret:
#   fly secrets set BEDROCK_BEARER_TOKEN=your_key_here

[[services]]
  internal_port = 52773
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "connections"
    hard_limit = 10
    soft_limit = 8

  [[services.tcp_checks]]
    grace_period = "120s"
    interval = "30s"
    timeout = "10s"
    restart_limit = 0

